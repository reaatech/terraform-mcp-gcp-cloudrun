name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREVIOUS_TAG" ]; then
            echo "changelog<<EOF" >> "$GITHUB_OUTPUT"
            echo "Initial release" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          else
            echo "changelog<<EOF" >> "$GITHUB_OUTPUT"
            git log --pretty=format:"- %s (%h)" "$PREVIOUS_TAG..HEAD" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          body: |
            ## Changes
            ${{ steps.changelog.outputs.changelog }}

            ## Installation
            ```hcl
            module "mcp_cloudrun" {
              source = "github.com/reaatech/terraform-mcp-gcp-cloudrun//modules/cloud-run?ref=${{ github.ref_name }}"
              # ... configuration
            }
            ```

  validate-release:
    name: Validate Release
    runs-on: ubuntu-latest
    needs: release
    strategy:
      matrix:
        dir:
          - modules/cloud-run
          - modules/firestore
          - modules/secrets
          - modules/pubsub
          - modules/iam
          - modules/monitoring
          - environments/dev
          - environments/prod
          - examples/basic
          - examples/multi-service
          - examples/vpc-sc
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Terraform Init
        run: terraform -chdir=${{ matrix.dir }} init -backend=false

      - name: Terraform Validate
        run: terraform -chdir=${{ matrix.dir }} validate
